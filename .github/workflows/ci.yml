name: CI

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-scan-push:
    name: Build / Scan / Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write   # for uploading Trivy SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Cache Gradle dependencies ──────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Set up QEMU for cross-platform emulation ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Set up Buildx ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Log in to GHCR ─────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image metadata (tags + labels) ──────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build multi-arch image and load amd64 locally for scanning ─────────
      - name: Build (amd64 local load for scan)
        id: build-local
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy vulnerability scan ───────────────────────────────────────────
      - name: Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: scan-target:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'          # fail the job on CRITICAL/HIGH findings
          ignore-unfixed: true

      # ── Upload SARIF to GitHub Security tab ───────────────────────────────
      - name: Upload Trivy SARIF
        if: always()              # upload even when scan step fails
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ── Build & push multi-arch image (only if scan passed) ───────────────
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true        # attach SLSA provenance attestation
          sbom: true              # attach SBOM attestation
