name: CI

on:
  push:
    branches: [main]

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECR_REPO: dockerfile-java

jobs:
  build-scan-push:
    name: Build / Scan / Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC auth to AWS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Cache Gradle dependencies ──────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Set up QEMU for cross-platform emulation ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Set up Buildx ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Authenticate to AWS via OIDC (no long-lived keys) ─────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Log in to ECR ──────────────────────────────────────────────────────
      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ── Derive image metadata (tags + labels) ──────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Build amd64 locally for scanning ──────────────────────────────────
      - name: Build (amd64 local load for scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: scan-target:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy: report all severities ──────────────────────────────────────
      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: scan-target:${{ github.sha }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          exit-code: '0'
          ignore-unfixed: false

      - name: Trivy summary
        run: |
          echo "### Trivy Scan Results" >> $GITHUB_STEP_SUMMARY
          jq -r '.Results[]?.Vulnerabilities[]? | .Severity' trivy-results.json \
            | sort | uniq -c | sort -rn \
            | awk '{print "- **" $2 "**: " $1}' >> $GITHUB_STEP_SUMMARY

      # ── Build & push multi-arch to ECR ────────────────────────────────────
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
